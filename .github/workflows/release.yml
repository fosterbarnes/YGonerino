name: Release

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        type: choice
        options:
          - 16.5
          - 17.5
          - 18.6
        required: true
        default: 16.5

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  build-tweak-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.1.1

      - name: Install dependencies
        run: brew install make ldid

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Get commit hashes
        id: commit_hashes
        uses: ./.github/actions/get-commit-hashes

      - name: Cache Theos
        id: theos
        uses: ./.github/actions/cache-theos
        with:
          sdk_version: ${{ inputs.sdk_version }}
          theos_commit: ${{ steps.commit_hashes.outputs.theos }}

      - name: Download iOS 16.5 SDK
        if: inputs.sdk_version == '16.5' && steps.theos.outputs.cache-hit != 'true'
        uses: ./.github/actions/download-sdk-16.5
        with:
          theos_path: ${{ github.workspace }}/theos

      - name: Download iOS 17.5 SDK
        if: inputs.sdk_version == '17.5' && steps.theos.outputs.cache-hit != 'true'
        uses: ./.github/actions/download-sdk-17.5
        with:
          theos_path: ${{ github.workspace }}/theos

      - name: Download iOS 18.6 SDK
        if: inputs.sdk_version == '18.6' && steps.theos.outputs.cache-hit != 'true'
        uses: ./.github/actions/download-sdk-18.6
        with:
          theos_path: ${{ github.workspace }}/theos

      - name: Clone YouTubeHeader
        uses: ./.github/actions/clone-youtube-header
        with:
          theos_path: ${{ github.workspace }}/theos

      - name: Cache build
        id: cache_build
        uses: ./.github/actions/cache-build
        with:
          source_commit: ${{ github.sha }}
          sdk_version: ${{ inputs.sdk_version }}
          youtube_header_commit: ${{ steps.commit_hashes.outputs.youtube_header }}
          theos_commit: ${{ steps.commit_hashes.outputs.theos }}

      - name: Build packages
        if: steps.cache_build.outputs.cache-hit != 'true'
        uses: ./.github/actions/build-package
        with:
          theos_path: ${{ github.workspace }}/theos
          workspace: ${{ github.workspace }}

      - name: Extract Values
        run: |
          NAME=$(grep '^Name:' control | cut -d ' ' -f 2)
          echo "NAME=$NAME" >> $GITHUB_ENV
          PACKAGE=$(grep '^Package:' control | cut -d ' ' -f 2)
          VERSION=$(grep '^Version:' control | cut -d ' ' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          ROOTLESS_DEB_FILE_NAME="${PACKAGE}_${VERSION}_iphoneos-arm64.deb"
          echo "ROOTLESS_DEB_FILE_NAME=$ROOTLESS_DEB_FILE_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2.0.1
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            .theos/obj/${{ env.NAME }}.dylib
            packages/${{ env.ROOTLESS_DEB_FILE_NAME }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Repository
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const assets = JSON.parse('${{ steps.create_release.outputs.assets }}');
            const debAsset = assets.find(asset => asset.name === '${{ env.ROOTLESS_DEB_FILE_NAME }}');
            
            if (!debAsset) {
              core.setFailed('Could not find DEB asset in release');
              return;
            }
            
            await github.rest.repos.createDispatchEvent({
              owner: 'castdrian',
              repo: 'apt-repo',
              event_type: 'package-update',
              client_payload: {
                package_url: debAsset.browser_download_url,
                package_name: '${{ env.ROOTLESS_DEB_FILE_NAME }}'
              }
            });

      - name: Output Release URL
        run: |
          echo "::notice::Release available at: https://github.com/${{ github.repository }}/releases"
